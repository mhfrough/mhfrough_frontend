@if (visible()) {
<div class="pn-prompt" role="dialog" aria-live="polite" aria-label="Push notification prompt">
    <div class="pn-prompt__inner">

        <svg class="pn-prompt__icon" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"
            fill="none">
            <path
                d="M16 4a1.5 1.5 0 0 1 1.5 1.5v1.1A8.5 8.5 0 0 1 24.5 15v5l2 3H5.5l2-3v-5a8.5 8.5 0 0 1 7-8.4V5.5A1.5 1.5 0 0 1 16 4Z"
                stroke="currentColor" stroke-width="1.4" stroke-linejoin="round" />
            <path d="M13.5 23a2.5 2.5 0 0 0 5 0" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" />
        </svg>

        <div class="pn-prompt__body">
            <p class="pn-prompt__title">Stay in the loop</p>
            <p class="pn-prompt__text">Enable notifications to get updates from mhfrough.dev.</p>
        </div>

        <div class="pn-prompt__actions">
            <button class="pn-prompt__btn pn-prompt__btn--dismiss" (click)="dismiss()" [disabled]="loading()">
                No thanks
            </button>
            <button class="pn-prompt__btn pn-prompt__btn--enable" (click)="enable()" [disabled]="loading()">
                @if (loading()) { Enabling… } @else { Enable }
            </button>
        </div>

    </div>
</div>
}
