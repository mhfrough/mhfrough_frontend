<div class="weather-widget" title="Weather - {{ location }}">
    <div class="weather-icon" [ngClass]="conditionKey" aria-hidden="true" [attr.aria-label]="displayLabel">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" focusable="false" aria-hidden="true" role="img">
            <title>{{ displayLabel }}</title>
            <circle cx="12" cy="12" r="4" fill="#FFB703" />
            <g stroke="#FFB703" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="1.8" x2="12" y2="4.2" />
                <line x1="12" y1="19.8" x2="12" y2="22" />
                <line x1="1.8" y1="12" x2="4.2" y2="12" />
                <line x1="19.8" y1="12" x2="22" y2="12" />
                <line x1="4.6" y1="4.6" x2="6.3" y2="6.3" />
                <line x1="17.7" y1="17.7" x2="19.4" y2="19.4" />
                <line x1="4.6" y1="19.4" x2="6.3" y2="17.7" />
                <line x1="17.7" y1="6.3" x2="19.4" y2="4.6" />
            </g>
        </svg>
    </div>
    <div class="weather-text">
        <span class="weather-temp">{{ temperature }}</span>
        <span class="weather-cond">{{ displayLabel }}</span>
    </div>

    
</div>
