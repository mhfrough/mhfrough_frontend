<div class="gold-widget" title="Gold per tola (PKR)">

  <!-- ── Icon: gold coin ──────────────────────────────────── -->
  <div class="gold-icon" aria-hidden="true">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" focusable="false" role="img">
      <title>Gold price per tola</title>
      <!-- outer coin ring -->
      <circle cx="12" cy="12" r="10.5" fill="#C47A00" opacity="0.25" />
      <!-- coin face (enlarged) -->
      <circle cx="12" cy="12" r="10" fill="#FFD166" />
      <!-- inner ring detail (enlarged) -->
      <circle cx="12" cy="12" r="8" fill="none" stroke="#C47A00" stroke-width="0.6" opacity="0.5" />
      <!-- Au symbol (centered and larger) -->
      <text x="12" y="12" text-anchor="middle" dominant-baseline="middle" font-size="9.5" font-weight="700"
        font-family="Inconsolata, monospace" fill="#8A5800" letter-spacing="0.5">Au</text>
    </svg>
  </div>

  <!-- ── Text ─────────────────────────────────────────────── -->
  <div class="gold-text">
    <span class="gold-price">{{ displayPrice }}</span>
    <span class="gold-label">Gold / tola</span>
  </div>

</div>
