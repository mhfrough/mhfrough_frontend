<div class="weather-widget" [attr.title]="'Weather · ' + location">

    <!-- ── Icon ─────────────────────────────────────────────── -->
    <div class="weather-icon" [class]="'weather-icon--' + conditionKey" aria-hidden="true">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" focusable="false" role="img">
            <title>{{ displayLabel }}</title>

            @switch (conditionKey) {

            @case ('sunny') {
            <circle cx="12" cy="12" r="4" fill="#FFB703" />
            <g stroke="#FFB703" stroke-width="1.3" stroke-linecap="round">
                <line x1="12" y1="2" x2="12" y2="4.4" />
                <line x1="12" y1="19.6" x2="12" y2="22" />
                <line x1="2" y1="12" x2="4.4" y2="12" />
                <line x1="19.6" y1="12" x2="22" y2="12" />
                <line x1="4.93" y1="4.93" x2="6.64" y2="6.64" />
                <line x1="17.36" y1="17.36" x2="19.07" y2="19.07" />
                <line x1="4.93" y1="19.07" x2="6.64" y2="17.36" />
                <line x1="17.36" y1="6.64" x2="19.07" y2="4.93" />
            </g>
            }

            @case ('partly-cloudy') {
            <!-- Sun left, clean cloud on the right -->
            <g aria-hidden="true">
                <circle cx="7.5" cy="9.5" r="3" fill="#FFB703" />
                <g stroke="#FFB703" stroke-width="1.1" stroke-linecap="round">
                    <line x1="7.5" y1="5.0" x2="7.5" y2="6.5" />
                    <line x1="7.5" y1="12.5" x2="7.5" y2="14.0" />
                    <line x1="5.4" y1="9.5" x2="6.8" y2="9.5" />
                    <line x1="9.0" y1="7.2" x2="9.8" y2="6.4" />
                </g>
            </g>
            <path
                d="M8 15 C8 12.8 9.8 11 12 11 C13.7 11 14.9 11.6 15.7 12.5 C17.6 12.2 18.9 13.4 19 15 C19 17 17.7 18.5 15.5 18.5 H9 C8 18.5 8 16.5 8 15 Z"
                fill="currentColor" opacity="0.95" />
            }

            @case ('cloudy') {
            <!-- Clean, modern cloud -->
            <path
                d="M6.5 15 C6.5 12.8 8.3 11 10.5 11 C12.1 11 13.3 11.6 14.1 12.5 C16.0 12.2 17.3 13.4 17.4 15 C17.4 17 16.1 18.5 13.9 18.5 H7.4 C6.4 18.5 6.4 16.5 6.4 15 Z"
                fill="currentColor" opacity="0.95" />
            }

            @case ('fog') {
            <g stroke="currentColor" stroke-width="1.3" stroke-linecap="round">
                <line x1="2" y1="7" x2="22" y2="7" />
                <line x1="2" y1="11.5" x2="22" y2="11.5" />
                <line x1="4" y1="16" x2="20" y2="16" />
                <line x1="6" y1="20.5" x2="18" y2="20.5" />
            </g>
            }

            @case ('rain') {
            <path d="M5 14 Q3.5 14 3.5 12.5 Q3.5 10 6 10 Q6.3 8 9 8 Q12 8 12 11 Q13.5 11 13.5 12.5 Q13.5 14 12 14 Z"
                fill="currentColor" />
            <g stroke="#69A7FF" stroke-width="1.5" stroke-linecap="round">
                <line x1="6" y1="16.5" x2="5" y2="19.5" />
                <line x1="9" y1="16.5" x2="8" y2="19.5" />
                <line x1="12" y1="16.5" x2="11" y2="19.5" />
            </g>
            }

            @case ('snow') {
            <path d="M5 13 Q3.5 13 3.5 11.5 Q3.5 9 6 9 Q6.3 7 9 7 Q12 7 12 10 Q13.5 10 13.5 11.5 Q13.5 13 12 13 Z"
                fill="currentColor" />
            <g fill="#D8E9FF">
                <circle cx="6" cy="16.5" r="1.1" />
                <circle cx="9.5" cy="18.5" r="1.1" />
                <circle cx="13" cy="16.5" r="1.1" />
            </g>
            }

            @case ('sleet') {
            <path d="M5 13 Q3.5 13 3.5 11.5 Q3.5 9 6 9 Q6.3 7 9 7 Q12 7 12 10 Q13.5 10 13.5 11.5 Q13.5 13 12 13 Z"
                fill="currentColor" />
            <g stroke="#69A7FF" stroke-width="1.4" stroke-linecap="round">
                <line x1="7" y1="16" x2="6.5" y2="18.5" />
                <line x1="12" y1="16" x2="11.5" y2="18.5" />
            </g>
            <circle cx="10" cy="18" r="1.1" fill="#D8E9FF" />
            }

            @case ('thunderstorm') {
            <path
                d="M4 13.5 Q2.5 13.5 2.5 12 Q2.5 9.5 5 9.5 Q5.3 7 8.5 7 Q12 7 12 10.5 Q14 10.5 14 12.5 Q14 13.5 12.5 13.5 Z"
                fill="currentColor" />
            <path d="M9 14 L6.5 18.5 L9.5 18.5 L8 22 L12 16 L9 16 Z" fill="#FFD166" />
            }

            @default {
            <path
                d="M5 17 Q3 17 3 15 Q3 12.5 5.5 12.5 Q5.8 10 9 10 Q12.5 10 12.5 13 Q14.5 13 14.5 15 Q14.5 17 12.5 17 Z"
                fill="currentColor" />
            }

            }
        </svg>
    </div>

    <!-- ── Text ─────────────────────────────────────────────── -->
    <div class="weather-text">
        <span class="weather-temp">{{ displayTemp }}</span>
        <span class="weather-cond">{{ displayLabel }}</span>
    </div>

</div>
