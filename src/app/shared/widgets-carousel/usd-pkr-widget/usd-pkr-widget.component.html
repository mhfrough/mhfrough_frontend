<div class="currency-widget" title="USD → PKR exchange rate">

  <!-- ── Icon: currency exchange ──────────────────────────── -->
  <div class="currency-icon" aria-hidden="true">
    <svg viewBox="-2 -2 28 28" xmlns="http://www.w3.org/2000/svg" focusable="false" role="img">
      <title>USD to PKR</title>
      <text x="12" y="12" text-anchor="middle" dominant-baseline="middle" font-size="20" font-weight="700"
        font-family="Inconsolata, monospace" fill="#10B981" class="dollar-sign" aria-hidden="true">$</text>
    </svg>
  </div>

  <!-- ── Text ─────────────────────────────────────────────── -->
  <div class="currency-text">
    <span class="currency-rate">{{ displayRate }}</span>
    <span class="currency-label">USD → PKR</span>
  </div>

</div>
