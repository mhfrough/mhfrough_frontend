<app-tool-page title="Image Format Converter" icon="bi-arrow-repeat"
    [loading]="loading()" [error]="error()"
    blurb="Convert between JPEG, PNG, WebP, AVIF and GIF. Quality applies to the lossy formats.">

    <div class="img">
        <!-- Upload zone -->
        <div class="img-drop" [class.over]="dragOver()"
            (dragover)="onDragOver($event)" (dragleave)="onDragLeave($event)" (drop)="onDrop($event)">
            <input type="file" id="fmtFile" class="img-drop-input" accept="image/*" (change)="onFileInput($event)" />
            <label for="fmtFile" class="img-drop-label">
                <i class="bi bi-cloud-arrow-up"></i>
                <span>Drop an image here or <strong>browse</strong></span>
            </label>
        </div>

        <!-- Controls -->
        <div class="img-controls-row">
            <div class="img-control">
                <label class="t-label" for="fmtSelect">Target format</label>
                <select id="fmtSelect" class="t-field" [ngModel]="format()" (ngModelChange)="format.set($event)">
                    @for (f of formats; track f) {
                    <option [value]="f">{{ f | uppercase }}</option>
                    }
                </select>
            </div>

            @if (isLossy()) {
            <div class="img-control img-control--grow">
                <label class="t-label" for="fmtQuality">Quality — {{ quality() }}</label>
                <input type="range" id="fmtQuality" class="img-range" min="1" max="100" step="1"
                    [ngModel]="quality()" (ngModelChange)="quality.set(+$event)" />
            </div>
            }
        </div>

        <div class="t-actions">
            <button type="button" class="t-btn" (click)="run()" [disabled]="loading() || !file()">
                <i class="bi bi-arrow-repeat"></i> Convert
            </button>
        </div>

        <!-- Previews -->
        @if (previewUrl(); as src) {
        <div class="img-grid">
            <figure class="img-card">
                <figcaption class="t-label">Original</figcaption>
                <img class="img-preview" [src]="src" alt="Original image preview" />
                @if (file(); as f) {
                <p class="img-meta">{{ formatBytes(f.size) }}</p>
                }
            </figure>

            @if (result(); as res) {
            <figure class="img-card">
                <figcaption class="t-label">{{ res.format | uppercase }}</figcaption>
                <img class="img-preview" [src]="res.output" alt="Converted image preview" />
                <p class="img-meta">{{ res.format | uppercase }} · {{ formatBytes(res.bytesOut) }}
                    · {{ res.width }}×{{ res.height }}</p>
            </figure>
            }
        </div>
        }

        <!-- Stats -->
        @if (result(); as res) {
        <div class="t-result">
            <div class="t-stats">
                <div class="t-stat">
                    <span class="t-stat-num">{{ res.format | uppercase }}</span>
                    <span class="t-stat-label">Format</span>
                </div>
                <div class="t-stat">
                    <span class="t-stat-num">{{ formatBytes(res.bytesOut) }}</span>
                    <span class="t-stat-label">Size</span>
                </div>
                <div class="t-stat">
                    <span class="t-stat-num" [class.t-stat-num--good]="res.savedPct > 0">{{ res.savedPct }}%</span>
                    <span class="t-stat-label">vs original</span>
                </div>
                <div class="t-stat">
                    <span class="t-stat-num">{{ res.width }}×{{ res.height }}</span>
                    <span class="t-stat-label">Dimensions</span>
                </div>
            </div>
            <div class="t-actions img-result-actions">
                <button type="button" class="t-btn" (click)="download()">
                    <i class="bi bi-download"></i> Download
                </button>
            </div>
        </div>
        }
    </div>
</app-tool-page>
