<app-tool-page title="Image Upscaler" icon="bi-arrows-fullscreen"
    [loading]="loading()" [error]="error()"
    blurb="Enlarge an image 2×, 3× or 4× using high-quality Lanczos resampling — sharp resizing, not AI super-resolution.">

    <div class="img">
        <!-- Upload zone -->
        <div class="img-drop" [class.over]="dragOver()"
            (dragover)="onDragOver($event)" (dragleave)="onDragLeave($event)" (drop)="onDrop($event)">
            <input type="file" id="upFile" class="img-drop-input" accept="image/*" (change)="onFileInput($event)" />
            <label for="upFile" class="img-drop-label">
                <i class="bi bi-cloud-arrow-up"></i>
                <span>Drop an image here or <strong>browse</strong></span>
            </label>
        </div>

        <!-- Scale control -->
        <div class="img-control">
            <label class="t-label">Scale factor</label>
            <div class="t-tabs" role="tablist" aria-label="Scale factor">
                @for (s of scales; track s) {
                <button type="button" class="t-tab" [class.active]="scale() === s" (click)="scale.set(s)">{{ s }}×</button>
                }
            </div>
        </div>

        <div class="t-actions">
            <button type="button" class="t-btn" (click)="run()" [disabled]="loading() || !file()">
                <i class="bi bi-arrows-fullscreen"></i> Upscale
            </button>
        </div>

        <!-- Previews -->
        @if (previewUrl(); as src) {
        <div class="img-grid">
            <figure class="img-card">
                <figcaption class="t-label">Original</figcaption>
                <img class="img-preview" [src]="src" alt="Original image preview" />
                @if (file(); as f) {
                <p class="img-meta">{{ formatBytes(f.size) }}</p>
                }
            </figure>

            @if (result(); as res) {
            <figure class="img-card">
                <figcaption class="t-label">Upscaled {{ scale() }}×</figcaption>
                <img class="img-preview" [src]="res.output" alt="Upscaled image preview" />
                <p class="img-meta">{{ res.format | uppercase }} · {{ formatBytes(res.bytesOut) }}
                    · {{ res.width }}×{{ res.height }}</p>
            </figure>
            }
        </div>
        }

        <!-- Stats -->
        @if (result(); as res) {
        <div class="t-result">
            <div class="t-stats">
                <div class="t-stat">
                    <span class="t-stat-num">{{ res.width }}×{{ res.height }}</span>
                    <span class="t-stat-label">New dimensions</span>
                </div>
                <div class="t-stat">
                    <span class="t-stat-num">{{ scale() }}×</span>
                    <span class="t-stat-label">Scale</span>
                </div>
                <div class="t-stat">
                    <span class="t-stat-num">{{ formatBytes(res.bytesOut) }}</span>
                    <span class="t-stat-label">Size</span>
                </div>
            </div>
            <div class="t-actions img-result-actions">
                <button type="button" class="t-btn" (click)="download()">
                    <i class="bi bi-download"></i> Download
                </button>
            </div>
        </div>
        }
    </div>
</app-tool-page>
