<app-tool-page title="Password Generator" icon="bi-key"
    [loading]="hashLoading()" [error]="hashError()"
    blurb="Generate strong, random passwords in your browser, then optionally hash them on the server.">

    <div class="pg">
        <!-- Result -->
        <div class="t-result pg-result">
            <div class="pg-result-main">
                <p class="t-result-label">Generated password</p>
                <span class="pg-value">{{ password() || '—' }}</span>
            </div>
            <div class="t-actions">
                <button type="button" class="t-btn t-btn--ghost" (click)="regenerate()" aria-label="Regenerate">
                    <i class="bi bi-arrow-clockwise"></i> New
                </button>
                <button type="button" class="t-btn t-btn--ghost" (click)="copyPassword()" [disabled]="!password()">
                    <i class="bi" [class]="copied() ? 'bi-check2' : 'bi-clipboard'"></i>
                    {{ copied() ? 'Copied' : 'Copy' }}
                </button>
            </div>
        </div>

        <!-- Strength -->
        @if (password()) {
        <div class="pg-strength" [attr.data-level]="strength().level">
            <div class="pg-strength-bar">
                @for (n of [1, 2, 3, 4]; track n) {
                <span class="pg-strength-seg" [class.on]="n <= strength().level"></span>
                }
            </div>
            <span class="pg-strength-label">{{ strength().label }}</span>
        </div>
        }

        <!-- Options -->
        <div class="t-panel pg-options">
            <div class="pg-length">
                <label class="t-label" for="pgLen">Length: <strong>{{ length() }}</strong></label>
                <input id="pgLen" class="pg-range" type="range" min="8" max="64" step="1"
                    [ngModel]="length()" (ngModelChange)="length.set($event); regenerate(false)" />
            </div>

            <div class="pg-toggles">
                <label class="t-check">
                    <input type="checkbox" [checked]="useUpper()"
                        (change)="useUpper.set($any($event.target).checked); regenerate(false)" />
                    Uppercase (A–Z)
                </label>
                <label class="t-check">
                    <input type="checkbox" [checked]="useLower()"
                        (change)="useLower.set($any($event.target).checked); regenerate(false)" />
                    Lowercase (a–z)
                </label>
                <label class="t-check">
                    <input type="checkbox" [checked]="useDigits()"
                        (change)="useDigits.set($any($event.target).checked); regenerate(false)" />
                    Digits (0–9)
                </label>
                <label class="t-check">
                    <input type="checkbox" [checked]="useSymbols()"
                        (change)="useSymbols.set($any($event.target).checked); regenerate(false)" />
                    Symbols (!&#64;#…)
                </label>
                <label class="t-check">
                    <input type="checkbox" [checked]="excludeAmbiguous()"
                        (change)="excludeAmbiguous.set($any($event.target).checked); regenerate(false)" />
                    Exclude ambiguous (O0Il1…)
                </label>
            </div>
        </div>

        <!-- Hash panel -->
        <div class="pg-hash-toggle">
            <button type="button" class="t-btn t-btn--ghost" (click)="showHash.set(!showHash())">
                <i class="bi" [class]="showHash() ? 'bi-chevron-up' : 'bi-chevron-down'"></i>
                {{ showHash() ? 'Hide hashing' : 'Hash this password' }}
            </button>
        </div>

        @if (showHash()) {
        <div class="t-panel pg-hash">
            <div class="t-row">
                <div class="pg-field">
                    <label class="t-label" for="pgHashAlg">Algorithm</label>
                    <select id="pgHashAlg" class="t-field" [ngModel]="hashAlgorithm()"
                        (ngModelChange)="hashAlgorithm.set($event)">
                        @for (a of hashAlgorithms; track a) {
                        <option [value]="a">{{ a }}</option>
                        }
                    </select>
                </div>
                @if (hashAlgorithm() === 'bcrypt') {
                <div class="pg-field pg-field--sm">
                    <label class="t-label" for="pgRounds">Rounds</label>
                    <input id="pgRounds" class="t-field" type="number" min="4" max="15" step="1"
                        [ngModel]="rounds()" (ngModelChange)="rounds.set($event)" />
                </div>
                }
                <div class="pg-field pg-field--btn">
                    <button type="button" class="t-btn" (click)="hash()" [disabled]="hashLoading() || !password()">
                        <i class="bi bi-hash"></i> Hash
                    </button>
                </div>
            </div>

            @if (hashResult(); as h) {
            <div class="pg-hash-out">
                <div class="pg-output-head">
                    <label class="t-label">{{ hashAlgorithm() | uppercase }} hash</label>
                    <button type="button" class="t-btn t-btn--ghost" (click)="copyHash()">
                        <i class="bi" [class]="hashCopied() ? 'bi-check2' : 'bi-clipboard'"></i>
                        {{ hashCopied() ? 'Copied' : 'Copy' }}
                    </button>
                </div>
                <textarea class="t-textarea pg-hash-value" readonly spellcheck="false" [value]="h"></textarea>
            </div>
            }
        </div>
        }
    </div>
</app-tool-page>
