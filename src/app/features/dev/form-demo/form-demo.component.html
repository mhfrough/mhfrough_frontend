<form [formGroup]="form" (ngSubmit)="submit()" novalidate>
    <h2>Form Demo</h2>

    <app-form-field label="Full name" [required]="true" [control]="form.get('name')"></app-form-field>

    <app-form-field label="Email" [required]="true" type="email" [control]="form.get('email')"></app-form-field>

    <app-form-field label="Age" type="int" [control]="form.get('age')"></app-form-field>

    <app-form-field label="Message" type="textarea" [maxlength]="500" [control]="form.get('message')"></app-form-field>

    <div class="actions">
        <button type="submit" class="btn">Submit</button>
    </div>
</form>
