<div class="admin-page-header">
    <div>
        <h1 class="admin-page-title">{{ editId() ? 'Edit Gallery Item' : 'New Gallery Item' }}</h1>
    </div>
    <a routerLink="/admin/gallery" class="btn-ghost"><i class="bi bi-arrow-left"></i> Back</a>
</div>

@if (loading()) {
<div class="loading-state">
    <div class="spinner"></div>
</div>
} @else {
<div class="admin-form-panel">
    <form #f="ngForm" (ngSubmit)="save(f)" novalidate>

        <div class="admin-form-field" style="width:100%">
            <label class="admin-form-label label-required">Media File
                <span class="form-hint">(image, gif, video — max 100 MB)</span>
            </label>
            <app-img-upload accept="image/*,video/mp4,video/webm,video/ogg,video/quicktime"
                [allowedTypes]="ALLOWED_MIME" [maxSizeMb]="100" hint="Images · GIF · MP4 · WebM · OGG · MOV · max 100 MB"
                [previewUrl]="mediaPreview()?.url ?? null" [previewType]="previewType()" [previewMeta]="mediaMeta()"
                [uploading]="uploading()" [uploadError]="uploadError()" (fileSelected)="onFileSelected($event)"
                (cleared)="mediaPreview.set(null)" />
            @if (!mediaPreview() && f.submitted) {
            <p style="font-size:0.78rem;color:#ef4444;margin-top:0.35rem;margin-bottom:0">
                <i class="bi bi-exclamation-circle"></i> Please upload a media file.
            </p>
            }
        </div>

        <div class="admin-form-grid">
            <div class="admin-form-field">
                <label class="admin-form-label label-optional">Title</label>
                <input ngModel [ngModel]="editing()?.title" name="title" class="admin-form-input"
                    placeholder="Photo title">
            </div>
            <div class="admin-form-field">
                <label class="admin-form-label label-optional">Category</label>
                <input ngModel [ngModel]="editing()?.category" name="category" class="admin-form-input"
                    placeholder="e.g. Photography, Design, Travel">
            </div>
        </div>

        <div class="admin-form-field">
            <label class="admin-form-label label-optional">Tags</label>
            <app-tag-input [tags]="formTags()" [suggestions]="allTags()"
                (tagsChange)="formTags.set($event)"></app-tag-input>
        </div>

        <div class="admin-form-field">
            <label class="admin-form-label label-optional">Caption</label>
            <textarea ngModel [ngModel]="editing()?.caption" name="caption" rows="2" class="admin-form-textarea"
                placeholder="A short description shown in the lightbox"></textarea>
        </div>

        <div class="admin-form-grid">
            <div class="admin-form-field">
                <label class="admin-form-label label-optional">Alt Text <span
                        class="form-hint">(accessibility)</span></label>
                <input ngModel [ngModel]="editing()?.altText" name="altText" class="admin-form-input"
                    placeholder="Describe the image for screen readers">
            </div>
        </div>

        <div class="admin-form-checks">
            <div class="admin-form-check checkbox-field">
                <input ngModel [ngModel]="editing()?.isPublished ?? true" name="isPublished" type="checkbox"
                    id="gal-pub">
                <label for="gal-pub">Published (visible on site)</label>
            </div>
        </div>

        <div class="admin-form-actions">
            <button type="submit" class="btn-primary" [disabled]="saving()">
                @if (saving()) { <span class="contact-spinner"></span>&nbsp; }
                {{ editId() ? 'Update' : 'Create' }}
            </button>
            <button type="button" class="btn-ghost" (click)="cancel()">Cancel</button>
        </div>
    </form>
</div>
}
