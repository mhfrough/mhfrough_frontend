<div class="admin-login-page">
    <div class="admin-login-topbar">
        <a routerLink="/" class="admin-login-back">
            <i class="bi bi-arrow-left"></i> Back to site
        </a>
    </div>
    <div class="admin-login-box">
        <p class="admin-login-logo">MHFrough &mdash; Admin</p>
        <h1 class="admin-login-heading">Sign in</h1>
        <p class="admin-login-sub">Enter your credentials to access the dashboard.</p>

        @if (error()) {
        <div class="admin-alert admin-alert--error">{{ error() }}</div>
        }

        <form #f="ngForm" (ngSubmit)="login(f)" novalidate>
            <div class="admin-form-field">
                <label class="admin-form-label">Email</label>
                <input ngModel name="email" required email type="email" class="admin-form-input"
                    [class.is-invalid]="f.submitted && f.controls['email']?.invalid"
                    placeholder="mhfrough&#64;yahoo.com" autocomplete="username">
            </div>
            <div class="admin-form-field">
                <label class="admin-form-label">Password</label>
                <div class="admin-pw-wrap">
                    <input ngModel name="password" required [type]="showPassword() ? 'text' : 'password'"
                        class="admin-form-input"
                        [class.is-invalid]="f.submitted && f.controls['password']?.invalid"
                        placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;" autocomplete="current-password">
                    <button type="button" class="admin-pw-toggle" (click)="showPassword.update(v => !v)"
                        [attr.aria-label]="showPassword() ? 'Hide password' : 'Show password'">
                        <i class="bi" [class.bi-eye]="!showPassword()" [class.bi-eye-slash]="showPassword()"></i>
                    </button>
                </div>
            </div>
            <div style="margin-top: 2rem;">
                <button type="submit" class="btn-primary" [disabled]="loading()"
                    style="width:100%; justify-content:center;">
                    @if (loading()) {
                    <span class="contact-spinner"></span>Signing in…
                    } @else {
                    Sign In
                    }
                </button>
            </div>
        </form>
    </div>
</div>
