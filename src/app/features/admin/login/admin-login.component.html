<div class="min-vh-100 d-flex align-items-center justify-content-center bg-body-secondary">
  <div class="card border-0 shadow-sm p-4 w-100" style="max-width:420px">
    <div class="text-center mb-4">
      <div class="fw-bold fs-3 text-indigo mb-1">MH Admin</div>
      <div class="text-body-secondary small">Sign in to your dashboard</div>
    </div>

    @if (error()) {
      <div class="alert alert-danger py-2 small">{{ error() }}</div>
    }

    <form #f="ngForm" (ngSubmit)="login(f)" novalidate>
      <div class="mb-3">
        <label class="form-label fw-medium">Email</label>
        <input ngModel name="email" required email type="email" class="form-control"
               [class.is-invalid]="f.submitted && f.controls['email']?.invalid"
               placeholder="mhfrough@yahoo.com" autocomplete="username">
      </div>
      <div class="mb-4">
        <label class="form-label fw-medium">Password</label>
        <input ngModel name="password" required type="password" class="form-control"
               [class.is-invalid]="f.submitted && f.controls['password']?.invalid"
               placeholder="••••••••" autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-indigo w-100" [disabled]="loading()">
        @if (loading()) {
          <span class="spinner-border spinner-border-sm me-2"></span>Signing in…
        } @else {
          Sign In
        }
      </button>
    </form>
  </div>
</div>
