<div class="d-flex flex-column flex-md-row min-vh-100 bg-body-secondary">
  <!-- Sidebar -->
  <aside class="admin-sidebar bg-body border-end py-4 px-3">
    <div class="fw-bold fs-5 text-indigo mb-4 px-2">⚡ MH Admin</div>
    <nav class="nav flex-column gap-1">
      <a class="nav-link rounded-2 px-3 py-2" routerLink="/admin/dashboard" routerLinkActive="bg-indigo text-white fw-semibold">
        <i class="bi bi-speedometer2 me-2"></i>Dashboard
      </a>
      <a class="nav-link rounded-2 px-3 py-2" routerLink="/admin/projects" routerLinkActive="bg-indigo text-white fw-semibold">
        <i class="bi bi-grid-3x3-gap me-2"></i>Projects
      </a>
      <a class="nav-link rounded-2 px-3 py-2" routerLink="/admin/blogs" routerLinkActive="bg-indigo text-white fw-semibold">
        <i class="bi bi-pencil-square me-2"></i>Blogs
      </a>
      <a class="nav-link rounded-2 px-3 py-2" routerLink="/admin/inquiries" routerLinkActive="bg-indigo text-white fw-semibold">
        <i class="bi bi-envelope me-2"></i>Inquiries
      </a>
      <a class="nav-link rounded-2 px-3 py-2" routerLink="/admin/feedback" routerLinkActive="bg-indigo text-white fw-semibold">
        <i class="bi bi-star me-2"></i>Feedback
      </a>
      <hr class="my-2">
      <a class="nav-link rounded-2 px-3 py-2" routerLink="/" target="_blank">
        <i class="bi bi-box-arrow-up-right me-2"></i>View Site
      </a>
      <button class="nav-link rounded-2 px-3 py-2 text-start text-danger border-0 bg-transparent w-100" (click)="logout()">
        <i class="bi bi-box-arrow-right me-2"></i>Logout
      </button>
    </nav>
  </aside>

  <!-- Content -->
  <main class="admin-content p-4">
    <router-outlet />
  </main>
</div>
